# Auto Park backend — Nginx (HTTPS).
# /ws/    → Daphne (WebSocket-чат)
# /       → Gunicorn (HTTP API + админка)
# /static → собранная статика админки (медиа идёт с R2, не через nginx)

upstream api {
    server web:8000;
}
upstream websocket {
    server ws:9000;
}

# HTTP → редирект на HTTPS (кроме ACME-challenge для продления сертификата).
server {
    listen 80;
    server_name api.autopark-app.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной сервер.
server {
    listen 443 ssl;
    http2 on;
    server_name api.autopark-app.com;

    ssl_certificate     /etc/letsencrypt/live/api.autopark-app.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.autopark-app.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25M;  # запас под загрузку фото объявлений

    # Статика админки/DRF.
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 7d;
    }

    # WebSocket-чат → Daphne.
    location /ws/ {
        proxy_pass http://websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # держим соединение чата открытым
    }

    # Всё остальное (API + админка) → Gunicorn.
    location / {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
