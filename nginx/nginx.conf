# Auto Park backend — Nginx.
# /ws/    → Daphne (WebSocket-чат)
# /       → Gunicorn (HTTP API + админка)
# /static → собранная статика админки (медиа идёт с R2, не через nginx)

upstream api {
    server web:8000;
}
upstream websocket {
    server ws:9000;
}

server {
    listen 80;
    server_name api.autopark-app.com;

    # Let's Encrypt ACME-challenge (для выпуска SSL-сертификата).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 25M;  # запас под загрузку фото объявлений

    # Статика админки/DRF.
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 7d;
    }

    # WebSocket-чат → Daphne.
    location /ws/ {
        proxy_pass http://websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # держим соединение чата открытым
    }

    # Всё остальное (API + админка) → Gunicorn.
    location / {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

